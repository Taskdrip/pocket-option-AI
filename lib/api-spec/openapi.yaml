openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Pocket Trader API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User profile operations
  - name: signals
    description: AI signal operations
  - name: trades
    description: Trade operations
  - name: topups
    description: Credit top-up operations
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/bot:
    patch:
      operationId: updateBotStatus
      tags: [users]
      summary: Toggle bot on/off and auto-confirm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotStatusUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /signals:
    get:
      operationId: getSignal
      tags: [signals]
      summary: Get current AI signal for an asset/timeframe
      parameters:
        - name: asset
          in: query
          required: true
          schema:
            type: string
        - name: timeframe
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List trade history for the current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: executeTrade
      tags: [trades]
      summary: Execute a trade (deducts 1 credit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "400":
          description: Not enough credits or bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trades/stats:
    get:
      operationId: getTradeStats
      tags: [trades]
      summary: Get trading statistics for current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /topups:
    get:
      operationId: listTopups
      tags: [topups]
      summary: List top-up requests for current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topup"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createTopup
      tags: [topups]
      summary: Submit a credit top-up request with TON transaction hash
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topup"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/topups:
    get:
      operationId: adminListTopups
      tags: [admin]
      summary: Admin - list all pending top-up requests
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopupWithUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/topups/{id}/approve:
    post:
      operationId: approveTopup
      tags: [admin]
      summary: Admin - approve a top-up request and credit the user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topup"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    RegisterInput:
      type: object
      required: [email, password, username]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        username:
          type: string
          minLength: 2

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email, username, credits, botActive, autoConfirm, isAdmin, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        credits:
          type: integer
        botActive:
          type: boolean
        autoConfirm:
          type: boolean
        isAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time

    BotStatusUpdate:
      type: object
      properties:
        botActive:
          type: boolean
        autoConfirm:
          type: boolean

    Signal:
      type: object
      required: [direction, confidence, rsi, ema9, ema21, asset, timeframe]
      properties:
        direction:
          type: string
          enum: [BUY, SELL, HOLD]
        confidence:
          type: number
        rsi:
          type: number
        ema9:
          type: number
        ema21:
          type: number
        asset:
          type: string
        timeframe:
          type: string

    TradeInput:
      type: object
      required: [asset, timeframe, amount, direction, confidence]
      properties:
        asset:
          type: string
        timeframe:
          type: string
        amount:
          type: number
        direction:
          type: string
          enum: [BUY, SELL]
        confidence:
          type: number

    Trade:
      type: object
      required: [id, userId, asset, timeframe, amount, direction, result, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        asset:
          type: string
        timeframe:
          type: string
        amount:
          type: number
        direction:
          type: string
          enum: [BUY, SELL]
        result:
          type: string
          enum: [win, loss]
        createdAt:
          type: string
          format: date-time

    TradeStats:
      type: object
      required: [totalTrades, wins, losses, winRate, creditsSpent]
      properties:
        totalTrades:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        winRate:
          type: number
        creditsSpent:
          type: integer

    TopupInput:
      type: object
      required: [package, txHash]
      properties:
        package:
          type: string
          enum: ["100", "500", "1000"]
        txHash:
          type: string

    Topup:
      type: object
      required: [id, userId, package, credits, usdAmount, tonAmount, txHash, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        package:
          type: string
        credits:
          type: integer
        usdAmount:
          type: number
        tonAmount:
          type: number
        txHash:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time

    TopupWithUser:
      type: object
      required: [id, userId, username, email, package, credits, usdAmount, tonAmount, txHash, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        username:
          type: string
        email:
          type: string
        package:
          type: string
        credits:
          type: integer
        usdAmount:
          type: number
        tonAmount:
          type: number
        txHash:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
