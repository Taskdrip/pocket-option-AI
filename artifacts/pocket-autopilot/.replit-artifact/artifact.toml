kind = "web"
previewPath = "/"
title = "Pocket Option Autopilot"
version = "1.0.0"
id = "artifacts/pocket-autopilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19238

[services.development]
run = "pnpm --filter @workspace/pocket-autopilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pocket-autopilot", "run", "build" ]
publicDir = "artifacts/pocket-autopilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19238"
BASE_PATH = "/"
