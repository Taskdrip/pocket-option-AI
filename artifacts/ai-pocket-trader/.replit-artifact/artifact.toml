kind = "web"
previewPath = "/"
title = "AI Pocket Trader"
version = "1.0.0"
id = "artifacts/ai-pocket-trader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24475

[services.development]
run = "pnpm --filter @workspace/ai-pocket-trader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-pocket-trader", "run", "build" ]
publicDir = "artifacts/ai-pocket-trader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24475"
BASE_PATH = "/"
